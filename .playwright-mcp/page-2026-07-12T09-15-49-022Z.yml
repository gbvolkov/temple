        - heading "Иерей Александр Владимирович Чуприн" [level=2] [ref=e174]
        - generic [ref=e175]: НАСТОЯТЕЛЬ ХРАМА
      - generic [ref=e176]:
        - paragraph [ref=e177]: Дорогие во Христе братья и сестры, друзья!
        - paragraph [ref=e178]: От всей души рад приветствовать вас на сайте храма Фёдоровской иконы Божией Матери посёлка Янтарный Аксайского района Ростовской-на-Дону епархии Русской Православной Церкви (Московский Патриархат).
        - paragraph [ref=e179]: Здесь вы познакомитесь с историей строительства нашего главного каменного храма, большого и красивого, который станет жемчужиной и духовным центром нашего посёлка и близлежащих. А так же мы будем рассказывать вам о жизни нашего прихода во временном, небольшом храме, который уже много лет служит духовным пристанищем и домом для наших прихожан, ставших единой семьёй, глава которой Христос.
        - paragraph [ref=e180]: Мы постараемся вам рассказать много интересного о православии и жизни святых подвижников. В разделах сайта найдете информацию о воскресной школе, социальном служении пастыря и мирян, узнаете об актуальных событиях приходской жизни, увидите наши фотографии.
        - paragraph [ref=e181]: Надеюсь, сайт послужит духовному укреплению и возрастанию в вере для Вас, и каждый, закрывая страничку, положит что-то в свою духовную копилку и с трепетом и любовью откроет ее вновь. Призываю на каждого, посетившего наш сайт с добрым сердцем и чистыми помыслами, милость и благословение Божие и небесное ходатайство Пресвятой Владычицы нашей Богородицы и Приснодевы Марии.
        - paragraph
        - paragraph
        - paragraph [ref=e182]: С уважением настоятель храма Фёдоровской иконы Божией Матери, иерей Александр Чуприн.
