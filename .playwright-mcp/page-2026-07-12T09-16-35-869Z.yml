    - generic [ref=e188]:
      - generic [ref=e189]:
        - heading "Дорогие друзья, братья и сестры!" [level=2] [ref=e190]
        - generic [ref=e191]: Добро пожаловать на официальный сайт храма преподобного Симеона Столпника на Поварской улице в Москве!
      - generic [ref=e192]:
        - paragraph [ref=e193]: Храм преподобного Симеона Столпника на Поварской – один из древнейших и красивейших храмов столицы. Расположенный в самом центре громкой и быстрой Москвы, храм является местом тишины, молитвы и общения с Богом.
        - paragraph [ref=e194]: История храма начинается в первой трети ХVII века, когда на месте деревянного на средства великого князя Федора Алексеевича был выстроен каменный храм.
        - paragraph [ref=e195]: В архивных документах он впервые упоминается как храм Введения во храм Пресвятой Богородицы. В храме также имелись приделы во имя преподобного Симеона Столпника и святителя Николая, который был переосвящен во имя святителя Димитрия, митрополита Ростовского.
        - paragraph [ref=e196]: В сентябре 1812 года храм Симеона Столпника обгорел во время пожара. Восстановленный и приведенный в порядок, он стал местом, куда ходили отец Александра Сергеевича Пушкина, Сергей Аксаков, Николай Васильевич Гоголь, семья Толстых, в доме которых Гоголь провел последние свои годы.
        - paragraph [ref=e197]: После революции 1917 года храм хотели снести, но усилиями общественности её удалось отстоять. В советские годы храм на несколько лет превратили в выставочный зал Всероссийского общества охраны природы.
        - paragraph [ref=e198]: 14 июня 1992 года, в праздник Святой Троицы, в храме была отслужена первая после многолетнего перерыва Божественная литургия. Возглавил ее протоиерей Сергей Никитин, до 2021 года несший послушание настоятеля.
        - generic [ref=e199]:
          - paragraph [ref=e200]: В сентябре 2021 года настоятелем храма Указом Святейшего Патриарха назначен священник Даниил Зубов.
          - text: Сегодня храм открыт каждый день, служится Божественная литургия, совершаются таинства Крещения, Венчания, Соборования. По вторникам проводятся Евангельские беседы, прихожане собираются на просмотры духовных фильмов.
      - link "Подробнее о храме" [ref=e202] [cursor=pointer]:
        - /url: /o-khrame/
