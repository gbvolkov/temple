    - generic [ref=e384]:
      - heading "Н.В. Гоголь и храм Преподобного Симеона Столпника на Поварской" [level=2] [ref=e386]
      - generic [ref=e387]:
        - paragraph [ref=e388]: "Статья посвящена роли, значению храма Преподобного Симеона Столпника на Поварской в жизни Н.В. Гоголя. Прихожанином этого старинного православного храма русский писатель стал уже в последний период своей жизни, когда поселился в Доме Талызина на Никитском бульваре у четы Толстых: графа Александра Петровича Толстого и графини Анны Георгиевны Толстой. Особенно часто он посещал этот храм в последние два месяца своей жизни, т.е. в январе-феврале 1852 г., что было связано с тяжелым переживанием кончины Екатерины Михайловны Хомяковой. Настоятель храма Симеона Столпника – протоиерей Алексей Иванович Соколов – неотступно находился при Н.В. Гоголе в последние дни его жизни, оказывал ему свою духовную помощь. Именно причт храма Симеона Столпника отпевал Гоголя и проводил его в горний мир."
        - paragraph [ref=e389]: "Ключевые слова: Н.В. Гоголь, храм Симеона Столпника, Е.М. Хомякова, Дом Талызина, А.П. Толстой, А.Г. Толстая, протоиерей А.И. Соколов"
